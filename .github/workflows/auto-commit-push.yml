name: Auto Commit & Push

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-commit-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Auto commit and push to main
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto push to main from master complete"
          branch: main
