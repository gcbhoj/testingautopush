name: Auto Commit & Push

on:
  push:
    branches:
      - master
  workflow_dispatch: 
permissions: 
  contents: write

jobs:
  auto-commit-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Commit and Push
        uses: offensive-vk/auto-commit-push@v8
        with:
          name: 'bhoj'
          email: 'gcbhoj@gmail.com'
          message: 'Auto push to main from master complete'
          branch: main
          github-token: ${{secrets.GITHUB_TOKEN}}
          
  
