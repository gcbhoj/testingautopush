name: Sync master to main

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push master to main
        run: |
          git checkout main || git checkout -b main
          git merge master
          git push origin main
